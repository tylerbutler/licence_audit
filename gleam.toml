name = "licence_audit"
version = "0.1.0"

description = "Audit licences of locked Hex dependencies in Gleam projects."
licences = ["Apache-2.0"]
repository = { type = "github", user = "tylerbutler", repo = "licence_audit" }

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
argv = ">= 1.1.0 and < 2.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
glint = { git = "https://github.com/tylerbutler/glint.git", ref = "glint-markdown" }
glint_markdown = { git = "https://github.com/tylerbutler/glint_markdown.git", ref = "main" }
gleam_community_ansi = ">= 1.5.0 and < 2.0.0"
envoy = ">= 1.2.0 and < 2.0.0"
slate = ">= 1.0.0 and < 2.0.0"
etch = ">= 1.3.3 and < 1.4.0"
youid = ">= 1.4.0 and < 2.0.0"
gleam_regexp = ">= 1.1.1 and < 2.0.0"
jsone = ">= 1.9.0 and < 2.0.0"
tomlet = ">= 1.0.0 and < 2.0.0"
tty = ">= 1.0.0 and < 2.0.0"
glam = ">= 2.0.4 and < 3.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
gleescript = ">= 1.5.2 and < 2.0.0"
gleam_time = ">= 1.8.0 and < 2.0.0"
glinter = ">= 2.19.0 and < 3.0.0"

[tools]

[tools.glinter]
include = ["src/", "test/"]

[tools.glinter.rules]
# Disabled: heavily stylistic and overwhelmingly noisy on this codebase.
label_possible = "off"
# Disabled: `let assert` is an accepted pattern in tests and known-safe spots.
assert_ok_pattern = "off"
# Disabled: this codebase deliberately falls back to defaults on `Error`
# (e.g. `dict.get` absent -> default, missing config -> sensible default).
thrown_away_error = "off"
# Disabled: the only discards are best-effort resource cleanup (connection /
# cache `close`, reporter `flush`) right before returning or halting.
discarded_result = "off"

[tools.glinter.ignore]
# gleeunit discovers `pub` test functions by reflection, type annotations add
# little in tests, and panicking is the idiomatic way for a test to fail.
"test/**/*.gleam" = ["unused_exports", "missing_type_annotation", "avoid_panic"]

[tools.licence_audit]
# any license types not listed here will be treated as unknown and will
# cause an audit check to fail
allow = ["Apache-2.0", "ISC", "MIT"] # add more here as needed

# license types listed here will cause an audit check to fail if they 
# are found in the locked dependencies
deny = ["AGPL-3.0"]
