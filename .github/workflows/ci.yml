name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Check formatting
        run: just format-check

      - name: Lint (glinter)
        run: just glint

      - name: Type check
        run: just check

      - name: Build (warnings as errors)
        run: just build-strict

      - name: Run tests
        run: just test

      - name: Smoke test built CLI
        run: ./licence_audit --help

      - name: Check generated docs are up to date
        run: just docs-check

      - name: Cache Hex licence metadata
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # ratchet:actions/cache@v4
        with:
          path: .hex-cache
          key: hex-licence-v2-${{ runner.os }}-${{ hashFiles('manifest.toml') }}
          restore-keys: |
            hex-licence-v2-${{ runner.os }}-

      - name: Check committed SBOM is up to date
        run: just sbom-drift-check

      - name: Validate SBOM (schema)
        run: just sbom-validate
