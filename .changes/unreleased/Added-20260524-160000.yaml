kind: Added
body: |-
  New `sbom` subcommand generates a CycloneDX 1.5 JSON Software Bill of Materials from `manifest.toml`. Supports `--output` to write to a file and `--offline` to skip Hex metadata fetch. Hex and GitHub git dependencies are supported; path and non-GitHub git deps cause a clear error.
