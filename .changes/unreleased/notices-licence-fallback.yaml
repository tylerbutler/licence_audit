kind: Added
body: '`notices` now recovers a licence when a dependency''s own source archive ships none: it follows the declared repository links (resolving a `v<version>`/`<version>` tag to an immutable commit on github.com, codeberg.org, or gitlab.com and fetching that archive), and, failing that, synthesizes canonical text from a pinned SPDX License List revision for the declared SPDX identifiers/expressions. Direct git-sourced dependencies (`source = "git"`) are now fetched at their immutable manifest commit from any of github.com, codeberg.org, or gitlab.com, not just GitHub. Any `NOTICE`/`COPYING` material shipped by the source is preserved, so a NOTICE-only package still gets a licence. Extracted source material, repository tag resolutions and files, final metadata-sensitive package results, and SPDX indexes/records shared per identifier are cached under immutable keys in `notices-v3.dets`; `--no-cache` disables it. A transient repository failure warns and continues to the SPDX fallback without freezing that degraded result in the cache, so a later run retries the repository.'
