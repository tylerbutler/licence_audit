kind: Fixed
body: SBOM generation no longer silently drops package enrichment (description, publisher, licences, and links) when a Hex metadata fetch fails. The licence cache now falls back to a stale cached entry when a refetch fails, and both the stale fallback and any package left without metadata are surfaced as clear warnings that include the underlying failure reason (connection, TLS, or timeout).
