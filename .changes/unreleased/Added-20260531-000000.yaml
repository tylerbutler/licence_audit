kind: Added
body: '`sbom --reproducible` flag for deterministic output: the `serialNumber` is derived from a SHA-256 hash of the BOM content and the `timestamp` comes from `SOURCE_DATE_EPOCH` (default `1970-01-01T00:00:00Z`), so the same dependency set always renders byte-identical output.'
