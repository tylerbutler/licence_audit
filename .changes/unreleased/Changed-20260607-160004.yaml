kind: Changed
body: SBOM output now emits canonical (lowercased) `pkg:hex` and `pkg:github` purls, recognises the full SPDX licence identifier list (emitting `license.id` instead of free-text names), adds `$schema`, a primary-component supplier and identifier, omits empty component versions, and de-duplicates declared licences.
