kind: Added
body: SBOM components for git-sourced dependencies are now enriched from the dependency's locally checked-out `gleam.toml` (`build/packages/<name>/gleam.toml`), adding description, licences, and links that previously only Hex packages received. The repository link is taken from the manifest git URL so it matches the component purl even when a dependency is sourced from a fork. When the local source is unavailable the component still carries a repository link and a warning records the omitted fields.
